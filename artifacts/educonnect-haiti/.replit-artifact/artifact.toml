kind = "web"
previewPath = "/"
title = "EduConnect Haïti"
version = "1.0.0"
id = "artifacts/educonnect-haiti"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19941

[services.development]
run = "pnpm --filter @workspace/educonnect-haiti run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/educonnect-haiti", "run", "build" ]
publicDir = "artifacts/educonnect-haiti/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19941"
BASE_PATH = "/"
